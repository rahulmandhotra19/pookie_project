<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Love Heart Animation</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #fff;
      font-family: Arial, sans-serif;
    }

    #stage {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: radial-gradient(circle at center, #fff8fb, #fff);
    }

    .emoji {
      position: absolute;
      transform: translate(-50%, -50%) scale(0);
      opacity: 0;
      animation: pop 0.4s ease forwards;
      user-select: none;
      pointer-events: none;
      white-space: nowrap;
      z-index: 3;
    }

    .bg-love-wall {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      z-index: 0;
      pointer-events: none;
      opacity: 0;
      transition: opacity 1.2s ease;
    }

    .bg-love-wall.show {
      opacity: 1;
    }

    .bg-love-grid {
      width: 92%;
      height: 88%;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 14px 28px;
      align-content: center;
      justify-items: center;
      transform: scale(1.02);
    }

    .bg-love-item {
      font-weight: 500;
      white-space: nowrap;
      color: rgba(40, 40, 40, 0.88);
      text-shadow: 0 1px 0 rgba(255,255,255,0.5);
      animation: softPulse 3.6s ease-in-out infinite;
      user-select: none;
    }

    @keyframes pop {
      0% {
        transform: translate(-50%, -50%) scale(0.2);
        opacity: 0;
      }
      70% {
        transform: translate(-50%, -50%) scale(1.2);
        opacity: 1;
      }
      100% {
        transform: translate(-50%, -50%) scale(1);
        opacity: 1;
      }
    }

    @keyframes softPulse {
      0%, 100% {
        transform: scale(1);
        opacity: 0.82;
      }
      50% {
        transform: scale(1.04);
        opacity: 1;
      }
    }
  </style>
</head>
<body>
  <div id="stage">
    <div id="bgLoveWall" class="bg-love-wall"></div>
  </div>

  <script>
    const stage = document.getElementById("stage");

    const emojis = [
      "❤️","💖","💕","💗","💘","💝","💞","💓",
      "💙","💜","😍","😘","🌹","💋","✨"
    ];

    const lovePhrases = [
      "💗 I Love You",
      "💖 I Love You",
      "💕 I Love You",
      "💓 I Love You",
      "💞 I Love You",
      "💘 I Love You"
    ];

    const phraseColors = [
      "#e91e63", "#ff4081", "#9c27b0", "#673ab7", "#3f51b5",
      "#2196f3", "#00bcd4", "#009688", "#ff5722", "#f44336",
      "#ff9800", "#c2185b"
    ];

    const points = [];
    const width = window.innerWidth;
    const height = window.innerHeight;

    for (let t = 0; t < Math.PI * 2; t += 0.045) {
      const x = 16 * Math.pow(Math.sin(t), 3);
      const y =
        13 * Math.cos(t) -
        5 * Math.cos(2 * t) -
        2 * Math.cos(3 * t) -
        Math.cos(4 * t);

      points.push({ x, y });
    }

    const scale = Math.min(width, height) / 38;
    const screenPoints = points.map((p) => ({
      x: width / 2 + p.x * scale,
      y: height / 2 - p.y * scale
    }));

    const filledPoints = [];
    for (let i = 0; i < screenPoints.length; i++) {
      const p = screenPoints[i];
      for (let j = 0; j < 3; j++) {
        const rx = (Math.random() - 0.5) * scale * 1.8;
        const ry = (Math.random() - 0.5) * scale * 1.8;
        filledPoints.push({ x: p.x + rx, y: p.y + ry });
      }
    }

    const allPoints = [...screenPoints, ...filledPoints];

    allPoints.sort((a, b) => {
      if (Math.abs(a.y - b.y) < 10) return a.x - b.x;
      return a.y - b.y;
    });

    function createEmoji(point) {
      const span = document.createElement("span");
      span.className = "emoji";
      span.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      span.style.left = point.x + "px";
      span.style.top = point.y + "px";
      span.style.fontSize = (16 + Math.random() * 18) + "px";
      stage.appendChild(span);
    }

    function shuffle(array) {
      const arr = [...array];
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function createLoveWall() {
      const wall = document.getElementById("bgLoveWall");
      const grid = document.createElement("div");
      grid.className = "bg-love-grid";

      const totalItems = 75;
      for (let n = 0; n < totalItems; n++) {
        const item = document.createElement("div");
        item.className = "bg-love-item";
        item.textContent = lovePhrases[n % lovePhrases.length];
        item.style.fontSize = (20 + Math.random() * 10) + "px";
        item.style.animationDelay = (Math.random() * 2.5) + "s";
        grid.appendChild(item);
      }

      wall.innerHTML = "";
      wall.appendChild(grid);
      requestAnimationFrame(() => wall.classList.add("show"));
    }

    

    let i = 0;
    const timer = setInterval(() => {
      for (let k = 0; k < 4 && i < allPoints.length; k++, i++) {
        createEmoji(allPoints[i]);
      }

      if (i >= allPoints.length) {
        clearInterval(timer);
        setTimeout(() => {
          createLoveWall();
        }, 500);
      }
    }, 35);
  </script>
</body>
</html>
